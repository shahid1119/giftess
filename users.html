<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Users – Admin</title><link rel="stylesheet" href="/css/admin.css"/><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/></head>
<body><div class="admin-layout"><aside class="sidebar" id="sidebar"></aside><div class="main-area"><header class="topbar"><button class="menu-btn" onclick="toggleSidebar()">☰</button><span class="top-title">Users</span></header><div class="content">
<div class="page-header"><h1 class="page-title">Users</h1><span class="count-text" id="ct"></span></div>
<div id="usersTable"><div class="spinner"></div></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/supabase-config.js"></script><script src="/admin/admin-common.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  renderSidebar('users'); await requireAdmin();
  const{data}=await sb().from('profiles').select('*').order('created_at',{ascending:false});
  document.getElementById('ct').textContent=(data?.length||0)+' users';
  document.getElementById('usersTable').innerHTML=`<div class="data-table">
    <div class="table-head" style="grid-template-columns:2fr 2fr 1.5fr 1fr"><span>Name</span><span>Email</span><span>Phone</span><span>Role</span></div>
    ${(data||[]).map(u=>`<div class="table-row" style="grid-template-columns:2fr 2fr 1.5fr 1fr">
      <span style="font-weight:600;color:#2D1B3D">${u.name||'—'}</span><span>${u.email||'—'}</span><span>${u.phone||'—'}</span>
      <span><span class="badge ${u.role==='admin'?'badge-purple':'badge-blue'}">${u.role||'customer'}</span></span>
    </div>`).join('')}</div>`;
});
</script></body></html>
