<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Free Gifts – Admin</title><link rel="stylesheet" href="/css/admin.css"/><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/></head>
<body><div class="admin-layout"><aside class="sidebar" id="sidebar"></aside><div class="main-area"><header class="topbar"><button class="menu-btn" onclick="toggleSidebar()">☰</button><span class="top-title">Free Gifts</span></header><div class="content">
<div class="page-header"><h1 class="page-title">Free Gifts</h1><button class="btn-primary" onclick="openForm()">+ Add Gift</button></div>
<div id="formWrap" style="display:none;background:white;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(155,114,160,.08);">
  <div class="form-grid2">
    <div class="form-group"><label>Gift Name *</label><input id="gName" placeholder="Chocolate Truffle Box"/></div>
    <div class="form-group"><label>SKU</label><input id="gSku" placeholder="GF34912"/></div>
    <div class="form-group"><label>Emoji</label><input id="gEmoji" value="🎁"/></div>
    <div class="form-group"><label>Original Price (₹)</label><input type="number" id="gPrice" placeholder="199"/></div>
  </div>
  <div style="display:flex;gap:10px;"><button class="btn-primary" onclick="saveGift()">Save</button><button class="btn-secondary" onclick="closeForm()">Cancel</button></div>
</div>
<div id="giftList"><div class="spinner"></div></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/supabase-config.js"></script><script src="/admin/admin-common.js"></script>
<script>
let editId=null;
document.addEventListener('DOMContentLoaded',async()=>{ renderSidebar('freegifts'); await requireAdmin(); load(); });
async function load(){
  const{data}=await sb().from('free_gifts').select('*').order('created_at');
  document.getElementById('giftList').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">${(data||[]).map(g=>`
    <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(155,114,160,.08)">
      <div style="font-size:36px;margin-bottom:10px">${g.emoji}</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${g.name}</div>
      <div style="font-size:13px;color:#9B8AAD;margin-bottom:4px">SKU: ${g.sku||'—'}</div>
      <div style="font-size:13px;text-decoration:line-through;color:#9B8AAD;margin-bottom:12px">₹${g.original_price} → FREE</div>
      <div style="display:flex;gap:8px"><button class="btn-outline" onclick="edit('${g.id}','${g.name}','${g.sku||''}','${g.emoji}',${g.original_price})">✏️ Edit</button><button class="btn-danger" onclick="del('${g.id}')">🗑</button></div>
    </div>`).join('')}</div>`;
}
function openForm(){ document.getElementById('formWrap').style.display='block'; }
function closeForm(){ document.getElementById('formWrap').style.display='none'; editId=null; }
function edit(id,name,sku,emoji,price){ editId=id; document.getElementById('gName').value=name; document.getElementById('gSku').value=sku; document.getElementById('gEmoji').value=emoji; document.getElementById('gPrice').value=price; openForm(); }
async function saveGift(){
  const d={name:document.getElementById('gName').value.trim(),sku:document.getElementById('gSku').value.trim(),emoji:document.getElementById('gEmoji').value,original_price:Number(document.getElementById('gPrice').value),active:true};
  if(!d.name){showToast('Enter a name','error');return;}
  if(editId) await sb().from('free_gifts').update(d).eq('id',editId);
  else await sb().from('free_gifts').insert(d);
  showToast('Saved!'); closeForm(); load();
}
async function del(id){ if(!confirm('Delete?'))return; await sb().from('free_gifts').delete().eq('id',id); load(); }
</script></body></html>
