<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login – Giftess</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#F9F0FF,#EEE0F5); padding:20px; }
    .auth-box { background:white; border-radius:24px; padding:40px 36px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(155,114,160,.2); }
    .auth-logo { font-size:22px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
    .auth-logo span { font-family:'Playfair Display',serif; color:#9B72A0; }
    .auth-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:#2D1B3D; margin-bottom:6px; }
    .auth-sub   { font-size:14px; color:#9B8AAD; margin-bottom:24px; }
    .auth-footer { font-size:13px; color:#9B8AAD; text-align:center; margin-top:20px; }
    .auth-footer a { color:#9B72A0; font-weight:600; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">🎁 <span>giftess</span></div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Login to your account</p>
    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()" id="loginBtn">Login</button>
    <p class="auth-footer">Don't have an account? <a href="/pages/register.html">Register</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showToast('Please fill all fields','error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Logging in…'; btn.disabled = true;
  const { error } = await sb().auth.signInWithPassword({ email, password });
  if (error) {
    showToast(error.message.includes('Invalid') ? 'Wrong email or password' : error.message, 'error');
    btn.textContent = 'Login'; btn.disabled = false;
    return;
  }
  showToast('Welcome back! 💜');
  const redirect = new URLSearchParams(location.search).get('redirect') || '/index.html';
  setTimeout(() => location.href = redirect, 800);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
