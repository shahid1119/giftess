<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cart – Giftess</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .cart-layout { display:grid; grid-template-columns:1fr 340px; gap:28px; padding:40px 5%; max-width:1200px; margin:0 auto; }
    .cart-item { background:white; border-radius:16px; padding:16px; display:flex; align-items:center; gap:16px; box-shadow:0 2px 12px rgba(155,114,160,.08); margin-bottom:14px; }
    .ci-img { width:80px; height:80px; border-radius:12px; background:#F5EEF8; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:32px; }
    .ci-img img { width:100%; height:100%; object-fit:cover; }
    .ci-info { flex:1; min-width:0; }
    .ci-name  { font-size:14px; font-weight:600; color:#2D1B3D; margin-bottom:4px; }
    .ci-sku   { font-size:11px; color:#9B8AAD; margin-bottom:4px; }
    .ci-price { font-size:14px; font-weight:600; color:#9B72A0; }
    .qty-ctrl { display:flex; align-items:center; border:1.5px solid #E8D5E8; border-radius:50px; overflow:hidden; flex-shrink:0; }
    .qty-ctrl button { width:34px; height:34px; background:none; border:none; font-size:16px; color:#9B72A0; }
    .qty-ctrl button:hover { background:#F5EEF8; }
    .qty-ctrl span { width:34px; text-align:center; font-weight:700; font-size:14px; }
    .ci-total  { font-size:15px; font-weight:700; color:#2D1B3D; min-width:70px; text-align:right; }
    .rm-btn    { background:none; border:none; font-size:18px; opacity:.5; transition:opacity .2s; flex-shrink:0; }
    .rm-btn:hover { opacity:1; }
    .summary-box { background:white; border-radius:20px; padding:24px; box-shadow:0 2px 16px rgba(155,114,160,.1); position:sticky; top:88px; }
    .summary-box h3 { font-family:'Playfair Display',serif; font-size:1.3rem; color:#2D1B3D; margin-bottom:20px; }
    .sum-row { display:flex; justify-content:space-between; font-size:14px; color:#5C4A6E; margin-bottom:10px; }
    .sum-total { font-size:17px; font-weight:700; color:#2D1B3D; border-top:1px solid #F5EEF8; padding-top:12px; margin-top:4px; }
    .free-gift-box { background:#F5EEF8; border:2px dashed #C8A2C8; border-radius:16px; padding:18px; margin-top:16px; }
    .free-gift-box h4 { font-size:14px; font-weight:700; color:#2D1B3D; margin-bottom:6px; }
    .free-gift-box p  { font-size:12px; color:#5C4A6E; margin-bottom:12px; }
    .fg-item { display:flex; align-items:center; gap:12px; padding:11px; background:white; border:1.5px solid #E8D5E8; border-radius:12px; margin-bottom:8px; cursor:pointer; transition:border-color .2s; }
    .fg-item input { display:none; }
    .fg-item.selected { border-color:#9B72A0; }
    .fg-name     { font-size:13px; font-weight:600; color:#2D1B3D; }
    .fg-free     { font-size:12px; font-weight:700; color:#27AE60; }
    .fg-orig     { font-size:12px; color:#9B8AAD; text-decoration:line-through; }
    .free-hint   { background:#FFF8E6; border:1px solid #D4A853; border-radius:12px; padding:14px; font-size:13px; color:#8B6914; font-weight:500; text-align:center; margin-top:14px; }
    @media(max-width:768px){ .cart-layout{grid-template-columns:1fr;} .cart-item{flex-wrap:wrap;} }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="page-hero"><h1>Shopping Cart 🛒</h1></div>

<div class="cart-layout">
  <div id="cartItems"></div>

  <div>
    <div class="summary-box">
      <h3>Order Summary</h3>
      <div class="sum-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
      <div class="sum-row"><span>Shipping</span><span id="sumShipping">₹99</span></div>
      <div class="sum-row sum-total"><span>Total</span><span id="sumTotal">₹99</span></div>
      <a href="/pages/checkout.html" class="btn-primary" style="width:100%;justify-content:center;margin-top:16px;box-sizing:border-box;" id="checkoutBtn">
        Proceed to Checkout →
      </a>
      <a href="/pages/products.html" class="btn-secondary" style="width:100%;justify-content:center;margin-top:10px;box-sizing:border-box;">
        Continue Shopping
      </a>
    </div>

    <div id="freeGiftSection" style="display:none;"></div>
    <div id="freeGiftHint" style="display:none;" class="free-hint"></div>
  </div>
</div>

<footer id="footer"></footer>
<a href="https://wa.me/916002698296" class="wa-float" target="_blank">💬</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/footer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  renderNavbar('cart');
  renderFooter();
  renderCart();

  // Load free gifts
  const { data: gifts } = await sb().from('free_gifts').select('*').eq('active', true);
  window._freeGifts = gifts || [];
  updateFreeGiftSection();
});

function renderCart() {
  const cart  = getCart();
  const wrap  = document.getElementById('cartItems');

  if (!cart.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Add some beautiful gifts to get started!</p>
        <a href="/pages/products.html" class="btn-primary">Browse Products</a>
      </div>`;
    updateSummary();
    return;
  }

  wrap.innerHTML = cart.map(item => `
    <div class="cart-item" id="ci_${item.id}">
      <div class="ci-img">
        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '🎁'}
      </div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-sku">SKU: ${item.sku}</div>
        <div class="ci-price">₹${Number(item.price).toLocaleString()}</div>
      </div>
      <div class="qty-ctrl">
        <button onclick="changeQty('${item.id}',-1)">−</button>
        <span id="qty_${item.id}">${item.qty}</span>
        <button onclick="changeQty('${item.id}',1)">+</button>
      </div>
      <div class="ci-total" id="tot_${item.id}">₹${(item.price*item.qty).toLocaleString()}</div>
      <button class="rm-btn" onclick="doRemove('${item.id}')">🗑</button>
    </div>`).join('');

  updateSummary();
  updateFreeGiftSection();
}

function changeQty(id, d) {
  const cart = getCart();
  const item = cart.find(i => i.id === id);
  if (!item) return;
  const newQty = item.qty + d;
  if (newQty < 1) { doRemove(id); return; }
  updateCartQty(id, newQty);
  document.getElementById('qty_'+id).textContent = newQty;
  document.getElementById('tot_'+id).textContent = '₹' + (item.price * newQty).toLocaleString();
  updateSummary();
  updateFreeGiftSection();
}

function doRemove(id) {
  removeFromCart(id);
  const el = document.getElementById('ci_'+id);
  if (el) el.remove();
  updateSummary();
  updateFreeGiftSection();
  if (!getCart().length) renderCart();
}

function updateSummary() {
  const total    = cartTotal();
  const shipping = total >= 999 ? 0 : 99;
  document.getElementById('sumSubtotal').textContent = '₹' + total.toLocaleString();
  document.getElementById('sumShipping').textContent = shipping === 0 ? '🎉 FREE' : '₹99';
  document.getElementById('sumTotal').textContent    = '₹' + (total + shipping).toLocaleString();
}

function updateFreeGiftSection() {
  const total   = cartTotal();
  const fgSec   = document.getElementById('freeGiftSection');
  const fgHint  = document.getElementById('freeGiftHint');
  const gifts   = window._freeGifts || [];

  if (total >= 999 && gifts.length) {
    fgHint.style.display = 'none';
    fgSec.style.display  = 'block';
    fgSec.innerHTML = `
      <div class="free-gift-box">
        <h4>🎁 Choose Your Free Gift!</h4>
        <p>Congratulations! You've unlocked a free gift.</p>
        ${gifts.map(g => `
          <label class="fg-item" id="fg_${g.id}" onclick="selectGift('${g.id}')">
            <input type="radio" name="freeGift" value="${g.id}">
            <span style="font-size:24px;">${g.emoji||'🎁'}</span>
            <div>
              <div class="fg-name">${g.name}</div>
              <div><span class="fg-orig">₹${g.original_price}</span> <span class="fg-free">FREE</span></div>
            </div>
          </label>`).join('')}
      </div>`;
  } else if (total < 999) {
    fgSec.style.display  = 'none';
    fgHint.style.display = 'block';
    fgHint.textContent   = `🎁 Add ₹${(999 - total).toLocaleString()} more to unlock a FREE gift!`;
  }
}

function selectGift(id) {
  document.querySelectorAll('.fg-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('fg_'+id);
  if (el) el.classList.add('selected');
  localStorage.setItem('giftess_free_gift', id);
}
</script>
</body>
</html>
