<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Order Detail – Giftess</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .od-wrap { max-width:800px; margin:0 auto; padding:40px 5%; }
    .od-card { background:white; border-radius:20px; padding:30px; box-shadow:0 2px 16px rgba(155,114,160,.08); }
    .od-top  { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .od-id   { font-family:'Playfair Display',serif; font-size:1.5rem; color:#2D1B3D; }
    .od-date { font-size:13px; color:#9B8AAD; margin-top:4px; }
    .progress { display:flex; justify-content:space-between; position:relative; margin-bottom:30px; }
    .progress-line { position:absolute; top:12px; left:0; right:0; height:3px; background:#E8D5E8; z-index:0; }
    .progress-fill { position:absolute; top:12px; left:0; height:3px; background:#9B72A0; z-index:1; transition:width .5s; }
    .progress-step { display:flex; flex-direction:column; align-items:center; gap:8px; z-index:2; flex:1; }
    .step-dot  { width:26px; height:26px; border-radius:50%; background:#E8D5E8; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:white; border:3px solid white; box-shadow:0 2px 8px rgba(155,114,160,.2); }
    .step-dot.done { background:#9B72A0; }
    .step-lbl  { font-size:10px; color:#9B8AAD; text-align:center; max-width:68px; font-weight:600; }
    .step-lbl.done { color:#9B72A0; }
    .track-box { background:#F5EEF8; border-radius:14px; padding:16px; margin-bottom:20px; }
    .track-box h4 { font-size:13px; font-weight:700; color:#9B72A0; margin-bottom:10px; }
    .track-row { font-size:13px; color:#5C4A6E; margin-bottom:6px; }
    .section-label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#9B72A0; margin-bottom:12px; }
    .od-item { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid #F5EEF8; }
    .od-item-img { width:56px; height:56px; border-radius:10px; background:#F5EEF8; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:24px; }
    .od-item-img img { width:100%; height:100%; object-fit:cover; }
    .od-item-name { flex:1; font-size:14px; font-weight:600; color:#2D1B3D; }
    .od-item-qty  { font-size:13px; color:#9B8AAD; }
    .od-item-total { font-size:14px; font-weight:700; color:#9B72A0; }
    .sum-row { display:flex; justify-content:space-between; font-size:14px; color:#5C4A6E; margin-top:8px; }
    .sum-total { font-size:17px; font-weight:700; color:#2D1B3D; border-top:1px solid #F5EEF8; padding-top:12px; margin-top:8px; }
    .addr-box { background:#F5EEF8; border-radius:14px; padding:16px; margin-top:20px; }
    .addr-box h4 { font-size:13px; font-weight:700; color:#9B72A0; margin-bottom:8px; }
    .addr-box p  { font-size:13px; color:#5C4A6E; line-height:1.8; }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="od-wrap">
  <a href="/pages/dashboard.html" style="color:#9B72A0;font-size:14px;font-weight:600;">← Back to Orders</a>
  <div style="margin-top:20px;" id="odContent"><div class="spinner"></div></div>
</div>

<footer id="footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/footer.js"></script>
<script>
const STATUSES = ['Pending','Processing','Shipped','Out for Delivery','Delivered'];
const STATUS_COLORS = { Pending:'badge-gold',Processing:'badge-blue',Shipped:'badge-purple','Out for Delivery':'badge-blue',Delivered:'badge-green',Cancelled:'badge-red' };
const orderId = new URLSearchParams(location.search).get('id');

document.addEventListener('DOMContentLoaded', async () => {
  renderNavbar();
  renderFooter();
  if (!orderId) { location.href='/pages/dashboard.html'; return; }

  const { data: o } = await sb().from('orders').select('*').eq('id', orderId).single();
  if (!o) { location.href='/pages/dashboard.html'; return; }

  const stepIdx = STATUSES.indexOf(o.status);
  const pct     = o.status === 'Cancelled' ? 0 : (stepIdx / (STATUSES.length-1)) * 100;

  document.getElementById('odContent').innerHTML = `
    <div class="od-card">
      <div class="od-top">
        <div>
          <div class="od-id">Order #${o.order_id}</div>
          <div class="od-date">${new Date(o.created_at).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <span class="badge ${STATUS_COLORS[o.status]||'badge-purple'}">${o.status}</span>
      </div>

      ${o.status !== 'Cancelled' ? `
      <div class="progress">
        <div class="progress-line"></div>
        <div class="progress-fill" style="width:${pct}%"></div>
        ${STATUSES.map((s,i)=>`
          <div class="progress-step">
            <div class="step-dot ${i<=stepIdx?'done':''}">${i<=stepIdx?'✓':i+1}</div>
            <span class="step-lbl ${i<=stepIdx?'done':''}">${s}</span>
          </div>`).join('')}
      </div>` : ''}

      ${o.tracking_number ? `
      <div class="track-box">
        <h4>📦 Tracking Info</h4>
        <div class="track-row"><strong>Courier:</strong> ${o.courier_name}</div>
        <div class="track-row"><strong>Tracking #:</strong> ${o.tracking_number}</div>
        ${o.tracking_link ? `<a href="${o.tracking_link}" target="_blank" class="btn-primary" style="margin-top:10px;display:inline-flex;font-size:13px;">Track Shipment →</a>` : ''}
      </div>` : ''}

      <div class="section-label">Items Ordered</div>
      ${(o.items||[]).map(item=>`
        <div class="od-item">
          <div class="od-item-img">${item.image ? `<img src="${item.image}" alt="">` : '🎁'}</div>
          <div class="od-item-name">${item.name}<div class="od-item-qty">Qty: ${item.qty} · SKU: ${item.sku}</div></div>
          <div class="od-item-total">₹${(item.price*item.qty).toLocaleString()}</div>
        </div>`).join('')}

      <div style="margin-top:16px;">
        <div class="sum-row"><span>Subtotal</span><span>₹${Number(o.subtotal).toLocaleString()}</span></div>
        <div class="sum-row"><span>Shipping</span><span>${o.shipping===0?'FREE':'₹'+o.shipping}</span></div>
        <div class="sum-row sum-total"><span>Total</span><span>₹${Number(o.total).toLocaleString()}</span></div>
      </div>

      <div class="addr-box">
        <h4>📍 Delivery Address</h4>
        <p>${o.address?.name}<br>${o.address?.phone}<br>${o.address?.address}, ${o.address?.city}, ${o.address?.state} – ${o.address?.pincode}${o.address?.landmark?'<br>'+o.address.landmark:''}</p>
      </div>
    </div>`;
});
</script>
</body>
</html>
