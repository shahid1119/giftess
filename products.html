<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Products – Admin</title>
  <link rel="stylesheet" href="/css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="top-title">Products</span>
    </header>
    <div class="content">
      <div class="page-header">
        <h1 class="page-title">Products</h1>
        <button class="btn-primary" onclick="openNew()">+ Add Product</button>
      </div>
      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="Search by name or SKU…" oninput="renderTable()"/>
        <span class="count-text" id="countText"></span>
      </div>
      <div id="tableWrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="e=>e.target===this&&closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modalTitle">Add Product</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid2">
        <div class="form-group"><label>Product Name *</label><input id="fName" placeholder="Crunch Munch Hamper"/></div>
        <div class="form-group"><label>SKU *</label>
          <div style="display:flex;gap:8px;">
            <input id="fSku" placeholder="GF34912" style="flex:1"/>
            <button class="btn-outline" onclick="document.getElementById('fSku').value='GF'+Math.floor(10000+Math.random()*90000)">↻</button>
          </div>
        </div>
        <div class="form-group"><label>Price (₹) *</label><input type="number" id="fPrice" placeholder="1299"/></div>
        <div class="form-group"><label>Original Price (₹)</label><input type="number" id="fOrigPrice" placeholder="2399"/></div>
        <div class="form-group"><label>Category *</label>
          <select id="fCat">
            <option value="birthday">Birthday</option><option value="anniversary">Anniversary</option>
            <option value="valentine">Valentine</option><option value="her">For Her</option>
            <option value="him">For Him</option><option value="gourmet">Gourmet</option>
            <option value="selfcare">Self Care</option><option value="unique">Unique</option><option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group"><label>Badge</label>
          <select id="fBadge"><option value="">None</option><option value="New">New</option><option value="Sale">Sale</option><option value="Hot">Hot</option></select>
        </div>
        <div class="form-group"><label>Stock</label><input type="number" id="fStock" value="0"/></div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:26px;">
          <input type="checkbox" id="fActive" checked style="width:18px;height:18px;accent-color:#9B72A0"/>
          <label for="fActive" style="font-size:14px;font-weight:600;color:#5C4A6E">Active (visible to customers)</label>
        </div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="fDesc" rows="3" placeholder="Describe the product…"></textarea></div>
      <div class="form-group">
        <label>Product Images</label>
        <div class="img-upload-area" onclick="document.getElementById('imgFile').click()">
          <span id="uploadLabel">📸 Click to upload images</span>
        </div>
        <input type="file" id="imgFile" multiple accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
        <div class="img-previews" id="imgPreviews"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="saveBtn" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/admin/admin-common.js"></script>
<script>
let allProducts = [];
let editingId   = null;
let imgUrls     = [];

document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('products');
  await requireAdmin();
  await loadProducts();
});

async function loadProducts() {
  const { data } = await sb().from('products').select('*').order('created_at',{ascending:false});
  allProducts = data || [];
  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(p => p.name?.toLowerCase().includes(q) || p.sku?.toLowerCase().includes(q));
  document.getElementById('countText').textContent = filtered.length + ' products';

  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty-admin"><div class="ei">🎁</div><h3>No products found</h3></div>`;
    return;
  }

  document.getElementById('tableWrap').innerHTML = `
    <div class="data-table">
      <div class="table-head" style="grid-template-columns:56px 2fr 1fr 1fr .8fr 1fr 160px">
        <span>Img</span><span>Name / SKU</span><span>Category</span><span>Price</span><span>Stock</span><span>Status</span><span>Actions</span>
      </div>
      ${filtered.map(p => `
        <div class="table-row" style="grid-template-columns:56px 2fr 1fr 1fr .8fr 1fr 160px">
          <span>
            <div style="width:48px;height:48px;border-radius:10px;background:#F5EEF8;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;">
              ${p.images?.[0] ? `<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover">` : '🎁'}
            </div>
          </span>
          <span><div style="font-size:14px;font-weight:600;color:#2D1B3D;margin-bottom:2px;">${p.name}</div><div style="font-size:11px;color:#9B8AAD;">${p.sku}</div></span>
          <span><span class="badge badge-purple">${p.category}</span></span>
          <span><div style="font-weight:700;color:#9B72A0;">₹${Number(p.price).toLocaleString()}</div>${p.original_price?`<div style="font-size:12px;color:#9B8AAD;text-decoration:line-through;">₹${Number(p.original_price).toLocaleString()}</div>`:''}</span>
          <span>${p.stock||0}</span>
          <span><button class="badge ${p.active?'badge-green':'badge-red'}" onclick="toggleActive('${p.id}',${p.active})" style="border:none;cursor:pointer;">${p.active?'Active':'Inactive'}</button></span>
          <span style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-outline" onclick="openEdit('${p.id}')">✏️ Edit</button>
            <button class="btn-danger" onclick="deleteProduct('${p.id}')">🗑</button>
          </span>
        </div>`).join('')}
    </div>`;
}

function openNew() {
  editingId = null; imgUrls = [];
  document.getElementById('modalTitle').textContent = 'Add Product';
  ['fName','fDesc','fPrice','fOrigPrice','fStock'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fSku').value = 'GF' + Math.floor(10000 + Math.random() * 90000);
  document.getElementById('fCat').value = 'birthday';
  document.getElementById('fBadge').value = '';
  document.getElementById('fActive').checked = true;
  document.getElementById('imgPreviews').innerHTML = '';
  document.getElementById('modal').style.display = 'flex';
}

function openEdit(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  imgUrls = p.images || [];
  document.getElementById('modalTitle').textContent = 'Edit Product';
  document.getElementById('fName').value = p.name || '';
  document.getElementById('fSku').value  = p.sku || '';
  document.getElementById('fPrice').value = p.price || '';
  document.getElementById('fOrigPrice').value = p.original_price || '';
  document.getElementById('fDesc').value  = p.description || '';
  document.getElementById('fCat').value   = p.category || 'birthday';
  document.getElementById('fBadge').value = p.badge || '';
  document.getElementById('fStock').value = p.stock || 0;
  document.getElementById('fActive').checked = p.active !== false;
  renderImgPreviews();
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  document.getElementById('uploadLabel').textContent = '⏳ Uploading…';
  for (const file of files) {
    const path = `products/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
    const { error } = await sb().storage.from('product-images').upload(path, file);
    if (!error) {
      const { data } = sb().storage.from('product-images').getPublicUrl(path);
      imgUrls.push(data.publicUrl);
    }
  }
  document.getElementById('uploadLabel').textContent = '📸 Click to upload more images';
  renderImgPreviews();
  showToast(`${files.length} image(s) uploaded`);
}

function renderImgPreviews() {
  document.getElementById('imgPreviews').innerHTML = imgUrls.map((url,i) => `
    <div class="img-preview">
      <img src="${url}" alt="">
      <button class="rm" onclick="removeImg(${i})">✕</button>
    </div>`).join('');
}

function removeImg(i) { imgUrls.splice(i,1); renderImgPreviews(); }

async function saveProduct() {
  const name = document.getElementById('fName').value.trim();
  const sku  = document.getElementById('fSku').value.trim();
  const price = Number(document.getElementById('fPrice').value);
  if (!name || !sku || !price) { showToast('Please fill Name, SKU, and Price','error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const data = {
    name, sku, price,
    original_price: Number(document.getElementById('fOrigPrice').value) || null,
    description: document.getElementById('fDesc').value,
    category: document.getElementById('fCat').value,
    badge: document.getElementById('fBadge').value,
    stock: Number(document.getElementById('fStock').value)||0,
    active: document.getElementById('fActive').checked,
    images: imgUrls,
  };

  let error;
  if (editingId) {
    ({ error } = await sb().from('products').update(data).eq('id', editingId));
  } else {
    ({ error } = await sb().from('products').insert(data));
  }

  btn.textContent = 'Save Product'; btn.disabled = false;
  if (error) { showToast('Error: '+error.message,'error'); return; }
  showToast(editingId ? 'Product updated!' : 'Product added!');
  closeModal();
  loadProducts();
}

async function toggleActive(id, current) {
  await sb().from('products').update({ active: !current }).eq('id', id);
  loadProducts();
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  await sb().from('products').delete().eq('id', id);
  showToast('Product deleted');
  loadProducts();
}
</script>
</body>
</html>
