<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Shop – Giftess</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .shop-layout { display:flex; gap:28px; padding:40px 5%; max-width:1300px; margin:0 auto; }
    .sidebar { width:220px; flex-shrink:0; }
    .filter-box { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 2px 12px rgba(155,114,160,.08); }
    .filter-box h4 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#9B72A0; margin-bottom:14px; }
    .filter-btn { display:block; width:100%; background:none; border:1.5px solid #E8D5E8; border-radius:50px; padding:7px 14px; font-size:13px; font-weight:500; color:#5C4A6E; text-align:left; margin-bottom:6px; transition:all .2s; cursor:pointer; }
    .filter-btn:hover,.filter-btn.active { background:#9B72A0; border-color:#9B72A0; color:white; }
    .main-area { flex:1; min-width:0; }
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:28px; flex-wrap:wrap; }
    .search-input { flex:1; min-width:180px; padding:10px 16px; border:1.5px solid #E8D5E8; border-radius:50px; font-size:14px; outline:none; font-family:'DM Sans',sans-serif; }
    .search-input:focus { border-color:#C8A2C8; }
    .sort-select { padding:10px 16px; border:1.5px solid #E8D5E8; border-radius:50px; font-size:13px; background:white; color:#5C4A6E; outline:none; font-family:'DM Sans',sans-serif; }
    .count-badge { font-size:13px; color:#9B8AAD; white-space:nowrap; }
    @media(max-width:768px){ .shop-layout{flex-direction:column;} .sidebar{width:100%;} .sidebar .filter-box{display:flex;gap:8px;flex-wrap:wrap;background:transparent;box-shadow:none;padding:0;margin:0;} .filter-box h4{display:none;} }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="page-hero">
  <h1>Our Products</h1>
  <p>Discover beautiful gift hampers for every occasion</p>
</div>

<div class="shop-layout">
  <aside class="sidebar">
    <div class="filter-box">
      <h4>Category</h4>
      <button class="filter-btn active" data-cat="all">All Products</button>
      <button class="filter-btn" data-cat="birthday">Birthday</button>
      <button class="filter-btn" data-cat="anniversary">Anniversary</button>
      <button class="filter-btn" data-cat="valentine">Valentine</button>
      <button class="filter-btn" data-cat="her">For Her</button>
      <button class="filter-btn" data-cat="him">For Him</button>
      <button class="filter-btn" data-cat="gourmet">Gourmet</button>
      <button class="filter-btn" data-cat="selfcare">Self Care</button>
      <button class="filter-btn" data-cat="unique">Unique</button>
    </div>
    <div class="filter-box">
      <h4>Price</h4>
      <button class="filter-btn active" data-min="0" data-max="999999">All Prices</button>
      <button class="filter-btn" data-min="0" data-max="999">Under ₹999</button>
      <button class="filter-btn" data-min="1000" data-max="2000">₹1,000–₹2,000</button>
      <button class="filter-btn" data-min="2000" data-max="5000">₹2,000–₹5,000</button>
      <button class="filter-btn" data-min="5000" data-max="999999">₹5,000+</button>
    </div>
  </aside>

  <div class="main-area">
    <div class="toolbar">
      <input class="search-input" id="searchInput" placeholder="Search products…" oninput="filterProducts()"/>
      <select class="sort-select" id="sortSelect" onchange="filterProducts()">
        <option value="">Default</option>
        <option value="lowhigh">Price: Low → High</option>
        <option value="highlow">Price: High → Low</option>
        <option value="newest">Newest First</option>
      </select>
      <span class="count-badge" id="countBadge">Loading…</span>
    </div>
    <div class="products-grid" id="productsGrid"><div class="spinner"></div></div>
  </div>
</div>

<footer id="footer"></footer>
<a href="https://wa.me/916002698296" class="wa-float" target="_blank">💬</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/footer.js"></script>
<script>
let allProducts = [];
let activeCat = 'all';
let activeMin = 0;
let activeMax = 999999;

document.addEventListener('DOMContentLoaded', async () => {
  renderNavbar('products');
  renderFooter();

  // read URL params
  const params = new URLSearchParams(location.search);
  if (params.get('cat')) {
    activeCat = params.get('cat');
    document.querySelectorAll('[data-cat]').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === activeCat);
    });
  }
  if (params.get('maxPrice')) activeMax = Number(params.get('maxPrice'));
  if (params.get('minPrice')) activeMin = Number(params.get('minPrice'));

  const { data } = await sb().from('products').select('*').eq('active', true).order('created_at', { ascending: false });
  allProducts = data || [];
  allProducts.forEach(p => { window._products[p.id] = p; });
  filterProducts();

  // category buttons
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterProducts();
    });
  });

  // price buttons
  document.querySelectorAll('[data-min]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeMin = Number(btn.dataset.min);
      activeMax = Number(btn.dataset.max);
      document.querySelectorAll('[data-min]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterProducts();
    });
  });
});

function filterProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort   = document.getElementById('sortSelect').value;
  let filtered = allProducts
    .filter(p => activeCat === 'all' || p.category === activeCat)
    .filter(p => p.price >= activeMin && p.price <= activeMax)
    .filter(p => p.name.toLowerCase().includes(search));

  if (sort === 'lowhigh') filtered.sort((a,b) => a.price - b.price);
  if (sort === 'highlow') filtered.sort((a,b) => b.price - a.price);

  const grid = document.getElementById('productsGrid');
  document.getElementById('countBadge').textContent = `${filtered.length} products`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎁</div><h3>No products found</h3><p>Try a different category or search term</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => productCardHTML(p)).join('');
}
</script>
</body>
</html>
