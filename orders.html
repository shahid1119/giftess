<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Orders – Admin</title>
  <link rel="stylesheet" href="/css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .orders-layout { display:grid; grid-template-columns:1fr 370px; gap:20px; }
    .order-list { display:flex; flex-direction:column; gap:10px; max-height:calc(100vh - 200px); overflow-y:auto; padding-right:4px; }
    .order-card { background:white; border-radius:14px; padding:16px; cursor:pointer; border:2px solid transparent; transition:all .2s; box-shadow:0 2px 10px rgba(155,114,160,.07); }
    .order-card:hover,.order-card.active { border-color:#9B72A0; background:#F5EEF8; }
    .oc-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .oc-id   { font-weight:700; color:#9B72A0; font-size:14px; }
    .oc-meta { display:flex; justify-content:space-between; font-size:13px; color:#5C4A6E; margin-bottom:4px; }
    .oc-date { font-size:11px; color:#9B8AAD; }
    .detail-panel { background:white; border-radius:16px; padding:22px; box-shadow:0 2px 12px rgba(155,114,160,.1); position:sticky; top:20px; max-height:calc(100vh - 120px); overflow-y:auto; }
    .dp-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .dp-head h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:#2D1B3D; }
    .dp-section { margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid #F5EEF8; }
    .dp-section:last-child { border-bottom:none; }
    .dp-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#9B72A0; margin-bottom:10px; }
    .status-btns { display:flex; flex-wrap:wrap; gap:6px; }
    .status-btn  { padding:6px 12px; border:1.5px solid #E8D5E8; border-radius:50px; background:white; font-size:12px; font-weight:500; color:#5C4A6E; transition:all .2s; }
    .status-btn:hover { border-color:#9B72A0; color:#9B72A0; }
    .status-btn.on { background:#9B72A0; border-color:#9B72A0; color:white; }
    .d-item { display:flex; justify-content:space-between; font-size:13px; color:#5C4A6E; padding:6px 0; border-bottom:1px solid #F5EEF8; }
    .d-total{ display:flex; justify-content:space-between; font-size:15px; font-weight:700; color:#2D1B3D; padding-top:8px; }
    .cust-info { font-size:13px; color:#5C4A6E; line-height:1.8; }
    @media(max-width:900px){ .orders-layout{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="top-title">Orders</span>
    </header>
    <div class="content">
      <div class="page-header">
        <h1 class="page-title">Orders</h1>
      </div>
      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="Search order ID or customer…" oninput="renderList()"/>
        <select class="filter-select" id="statusFilter" onchange="renderList()">
          <option value="">All Status</option>
          <option>Pending</option><option>Processing</option><option>Shipped</option>
          <option>Out for Delivery</option><option>Delivered</option><option>Cancelled</option>
        </select>
        <span class="count-text" id="countText"></span>
      </div>
      <div class="orders-layout">
        <div class="order-list" id="orderList"><div class="spinner"></div></div>
        <div class="detail-panel" id="detailPanel" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/admin/admin-common.js"></script>
<script>
const STATUS_COLORS = { Pending:'badge-gold',Processing:'badge-blue',Shipped:'badge-purple','Out for Delivery':'badge-blue',Delivered:'badge-green',Cancelled:'badge-red' };
const STATUSES = ['Pending','Processing','Shipped','Out for Delivery','Delivered','Cancelled'];
let allOrders = [];
let selectedOrder = null;

document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('orders');
  await requireAdmin();
  await loadOrders();
});

async function loadOrders() {
  const { data } = await sb().from('orders').select('*').order('created_at',{ascending:false});
  allOrders = data || [];
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const filtered = allOrders
    .filter(o => !s || o.status === s)
    .filter(o => o.order_id?.toLowerCase().includes(q) || o.user_name?.toLowerCase().includes(q));

  document.getElementById('countText').textContent = filtered.length + ' orders';
  const list = document.getElementById('orderList');
  if (!filtered.length) { list.innerHTML = `<div class="empty-admin"><div class="ei">📦</div><h3>No orders found</h3></div>`; return; }

  list.innerHTML = filtered.map(o => `
    <div class="order-card ${selectedOrder?.id===o.id?'active':''}" id="oc_${o.id}" onclick="openOrder('${o.id}')">
      <div class="oc-top">
        <span class="oc-id">#${o.order_id}</span>
        <span class="badge ${STATUS_COLORS[o.status]||'badge-purple'}">${o.status}</span>
      </div>
      <div class="oc-meta"><span>👤 ${o.user_name}</span><span>₹${Number(o.total).toLocaleString()}</span></div>
      <div class="oc-date">${new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
    </div>`).join('');
}

function openOrder(id) {
  selectedOrder = allOrders.find(o => o.id === id);
  if (!selectedOrder) return;
  document.querySelectorAll('.order-card').forEach(c => c.classList.remove('active'));
  document.getElementById('oc_'+id)?.classList.add('active');
  renderDetail();
}

function renderDetail() {
  const o = selectedOrder;
  const panel = document.getElementById('detailPanel');
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="dp-head">
      <h3>#${o.order_id}</h3>
      <button class="btn-outline" onclick="document.getElementById('detailPanel').style.display='none'">✕</button>
    </div>

    <div class="dp-section">
      <div class="dp-label">Update Status</div>
      <div class="status-btns">
        ${STATUSES.map(s=>`<button class="status-btn ${o.status===s?'on':''}" onclick="updateStatus('${o.id}','${s}')">${s}</button>`).join('')}
      </div>
    </div>

    <div class="dp-section">
      <div class="dp-label">Tracking Info</div>
      <div class="form-group"><label>Courier Name</label><input id="tCourier" value="${o.courier_name||''}" placeholder="Blue Dart, DTDC…"/></div>
      <div class="form-group"><label>Tracking Number</label><input id="tNumber" value="${o.tracking_number||''}" placeholder="BD1234567890"/></div>
      <div class="form-group"><label>Tracking Link</label><input id="tLink" value="${o.tracking_link||''}" placeholder="https://…"/></div>
      <button class="btn-primary" onclick="saveTracking('${o.id}')">Save Tracking</button>
    </div>

    <div class="dp-section">
      <div class="dp-label">Items</div>
      ${(o.items||[]).map(i=>`<div class="d-item"><span>${i.name} × ${i.qty}</span><span>₹${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
      <div class="d-total"><span>Total</span><span>₹${Number(o.total).toLocaleString()}</span></div>
    </div>

    <div class="dp-section">
      <div class="dp-label">Customer</div>
      <div class="cust-info">
        📧 ${o.user_email}<br>
        📱 ${o.address?.phone}<br>
        📍 ${o.address?.address}, ${o.address?.city}, ${o.address?.state} – ${o.address?.pincode}
      </div>
    </div>`;
}

async function updateStatus(id, status) {
  await sb().from('orders').update({ status }).eq('id', id);
  const o = allOrders.find(x => x.id === id);
  if (o) o.status = status;
  if (selectedOrder?.id === id) selectedOrder.status = status;
  showToast('Status → ' + status);
  renderList();
  renderDetail();
}

async function saveTracking(id) {
  const courier  = document.getElementById('tCourier').value;
  const number   = document.getElementById('tNumber').value;
  const link     = document.getElementById('tLink').value;
  await sb().from('orders').update({ courier_name:courier, tracking_number:number, tracking_link:link }).eq('id', id);
  const o = allOrders.find(x => x.id === id);
  if (o) { o.courier_name=courier; o.tracking_number=number; o.tracking_link=link; }
  showToast('Tracking saved!');
}
</script>
</body>
</html>
