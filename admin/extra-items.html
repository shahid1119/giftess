<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Extra Items – Admin</title><link rel="stylesheet" href="/css/admin.css"/><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/></head>
<body><div class="admin-layout"><aside class="sidebar" id="sidebar"></aside><div class="main-area"><header class="topbar"><button class="menu-btn" onclick="toggleSidebar()">☰</button><span class="top-title">Extra Gift Items</span></header><div class="content">
<div class="page-header"><h1 class="page-title">Extra Gift Items</h1><button class="btn-primary" onclick="openForm()">+ Add Item</button></div>
<div id="formWrap" style="display:none;background:white;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(155,114,160,.08);">
  <div class="form-grid2">
    <div class="form-group"><label>Item Name *</label><input id="eName" placeholder="Greeting Card"/></div>
<div class="form-group"><label>Price (₹) *</label><input type="number" id="ePrice" placeholder="49"/></div>
<div class="form-group">
  <label>Image (upload or paste URL)</label>
  <input id="eImage" placeholder="https://... or upload below" style="margin-bottom:8px;"/>
  <div style="display:flex;gap:8px;align-items:center;">
    <input type="file" id="eImgFile" accept="image/*" style="display:none" onchange="uploadExtraImg(event)"/>
    <button type="button" class="btn-outline" onclick="document.getElementById('eImgFile').click()">📁 Upload Image</button>
    <span id="eImgStatus" style="font-size:12px;color:#9B8AAD;"></span>
  </div>
  <div id="eImgPreview" style="margin-top:10px;display:none;">
    <img id="eImgPreviewEl" style="width:80px;height:80px;border-radius:12px;object-fit:cover;border:2px solid #E8D5E8;"/>
  </div>
</div>
  </div>
  <div style="display:flex;gap:10px;"><button class="btn-primary" onclick="saveItem()">Save</button><button class="btn-secondary" onclick="closeForm()">Cancel</button></div>
</div>
<div id="itemList"><div class="spinner"></div></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/supabase-config.js"></script><script src="/admin/admin-common.js"></script>
<script>
let editId=null;
document.addEventListener('DOMContentLoaded',async()=>{ renderSidebar('extras'); await requireAdmin(); load(); });
async function load(){
  const{data}=await sb().from('extra_items').select('*').order('created_at');
  document.getElementById('itemList').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px">${(data||[]).map(i=>`
    <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(155,114,160,.08)">

      ${i.image?.startsWith('http')
  ? `<img src="${i.image}" style="width:60px;height:60px;border-radius:10px;object-fit:cover;margin-bottom:8px;">`
  : `<div style="font-size:32px;margin-bottom:8px">✨</div>`}
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">${i.name}</div>
      <div style="font-size:13px;color:#9B72A0;font-weight:600;margin-bottom:12px">+₹${i.price}</div>
      <div style="display:flex;gap:8px"><button class="btn-outline" onclick="edit('${i.id}','${i.name}','${i.image||''}',${i.price})">✏️</button><button class="btn-danger" onclick="del('${i.id}')">🗑</button></div>
    </div>`).join('')}</div>`;
}
function openForm(){ document.getElementById('formWrap').style.display='block'; }
function closeForm(){ document.getElementById('formWrap').style.display='none'; editId=null; }

  function edit(id,name,image,price){
  editId=id;
  document.getElementById('eName').value=name;
  document.getElementById('eImage').value=image||'';
  document.getElementById('ePrice').value=price;
  if(image?.startsWith('http')){
    document.getElementById('eImgPreview').style.display='block';
    document.getElementById('eImgPreviewEl').src=image;
  }
  openForm();
}

  async function uploadExtraImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('eImgStatus').textContent = '⏳ Uploading…';
  const path = `extras/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
  const { error } = await sb().storage.from('product-images').upload(path, file);
  if (error) { document.getElementById('eImgStatus').textContent = '❌ Failed'; return; }
  const { data } = sb().storage.from('product-images').getPublicUrl(path);
  document.getElementById('eImage').value = data.publicUrl;
  document.getElementById('eImgStatus').textContent = '✅ Uploaded!';
  document.getElementById('eImgPreview').style.display = 'block';
  document.getElementById('eImgPreviewEl').src = data.publicUrl;
}
async function saveItem(){
  const d={name:document.getElementById('eName').value.trim(),image:document.getElementById('eImage').value.trim(),price:Number(document.getElementById('ePrice').value),active:true};
  if(!d.name||!d.price){showToast('Fill Name and Price','error');return;}
  if(editId) await sb().from('extra_items').update(d).eq('id',editId);
  else await sb().from('extra_items').insert(d);
  showToast('Saved!'); closeForm(); load();
}
async function del(id){ if(!confirm('Delete?'))return; await sb().from('extra_items').delete().eq('id',id); load(); }
</script></body></html>
