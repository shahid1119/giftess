<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Dashboard – Giftess</title>
  <link rel="stylesheet" href="/css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="top-title">Dashboard</span>
      <a href="/index.html" target="_blank" style="font-size:13px;color:#9B72A0;font-weight:600;">🌐 View Site</a>
    </header>
    <div class="content">
      <div class="stat-grid" id="stats"><div class="spinner"></div></div>
      <div style="background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(155,114,160,.08);">
        <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;color:#2D1B3D;margin-bottom:18px;">Recent Orders</h3>
        <div id="recentOrders"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/admin/admin-common.js"></script>
<script>
const STATUS_COLORS = { Pending:'badge-gold',Processing:'badge-blue',Shipped:'badge-purple','Out for Delivery':'badge-blue',Delivered:'badge-green',Cancelled:'badge-red' };

document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('dashboard');
  await requireAdmin();

  const [ordersRes, usersRes, productsRes] = await Promise.all([
    sb().from('orders').select('*'),
    sb().from('profiles').select('id'),
    sb().from('products').select('id').eq('active',true),
  ]);

  const orders  = ordersRes.data || [];
  const revenue = orders.reduce((s,o) => s + (o.total||0), 0);

  document.getElementById('stats').innerHTML = [
    { label:'Total Orders',    value: orders.length,           icon:'📦', color:'#9B72A0' },
    { label:'Total Revenue',   value:'₹'+revenue.toLocaleString(), icon:'💰', color:'#D4A853' },
    { label:'Total Users',     value: usersRes.data?.length||0,  icon:'👥', color:'#2980B9' },
    { label:'Active Products', value: productsRes.data?.length||0,icon:'🎁', color:'#27AE60' },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  const recent = [...orders].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,8);
  document.getElementById('recentOrders').innerHTML = `
    <div class="data-table">
      <div class="table-head" style="grid-template-columns:1.5fr 1.5fr 1fr 1fr 1fr">
        <span>Order ID</span><span>Customer</span><span>Total</span><span>Status</span><span>Date</span>
      </div>
      ${recent.map(o => `
        <div class="table-row" style="grid-template-columns:1.5fr 1.5fr 1fr 1fr 1fr">
          <span style="font-weight:700;color:#9B72A0">#${o.order_id}</span>
          <span>${o.user_name}</span>
          <span>₹${Number(o.total).toLocaleString()}</span>
          <span><span class="badge ${STATUS_COLORS[o.status]||'badge-purple'}">${o.status}</span></span>
          <span style="font-size:12px">${new Date(o.created_at).toLocaleDateString('en-IN')}</span>
        </div>`).join('')}
    </div>`;
});
</script>
</body>
</html>
